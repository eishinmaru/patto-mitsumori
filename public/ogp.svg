<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- 背景 -->
  <rect width="1200" height="630" fill="#1B3A6B"/>
  <!-- 右下の装飾円 -->
  <circle cx="1100" cy="560" r="320" fill="#253C62" opacity="0.6"/>
  <circle cx="1050" cy="500" r="180" fill="#253C62" opacity="0.5"/>
  <!-- 左上の装飾 -->
  <circle cx="80" cy="80" r="120" fill="#253C62" opacity="0.4"/>

  <!-- アクセントライン -->
  <rect x="0" y="580" width="1200" height="8" fill="#E97B2E"/>
  <rect x="80" y="200" width="6" height="160" fill="#E97B2E" rx="3"/>

  <!-- ハンマーアイコン（シンプルなSVGアイコン） -->
  <text x="96" y="185" font-size="80" font-family="sans-serif">🔨</text>

  <!-- メインタイトル -->
  <text x="96" y="320" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif"
        font-size="96" font-weight="700" fill="#FFFFFF" letter-spacing="-2">パッと見積</text>

  <!-- サブタイトル -->
  <text x="100" y="395" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif"
        font-size="36" font-weight="400" fill="#A8C0E0">現場でパッと、すぐ出せる見積書</text>

  <!-- バッジ -->
  <rect x="100" y="430" width="280" height="52" rx="26" fill="#E97B2E"/>
  <text x="240" y="463" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif"
        font-size="24" font-weight="700" fill="#FFFFFF">職人・一人親方向け 無料</text>

  <!-- 右側：機能リスト -->
  <rect x="780" y="160" width="340" height="290" rx="16" fill="#253C62" opacity="0.8"/>
  <text x="950" y="210" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif"
        font-size="22" font-weight="700" fill="#E97B2E">できること</text>
  <line x1="800" y1="225" x2="1100" y2="225" stroke="#E97B2E" stroke-width="1" opacity="0.5"/>

  <text x="810" y="265" font-family="sans-serif" font-size="20" fill="#FFFFFF">📝  品目・単価を高速入力</text>
  <text x="810" y="305" font-family="sans-serif" font-size="20" fill="#FFFFFF">📄  PDFで即ダウンロード</text>
  <text x="810" y="345" font-family="sans-serif" font-size="20" fill="#FFFFFF">💬  LINEで簡単に送付</text>
  <text x="810" y="385" font-family="sans-serif" font-size="20" fill="#FFFFFF">💾  データはスマホに保存</text>

  <!-- URL -->
  <text x="1190" y="615" text-anchor="end"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="20" fill="#A8C0E0" opacity="0.8">patto-mitsumori.vercel.app</text>
</svg>
